services:
  omniforum:
    build:
      context: .
    image: omniforum:local
    container_name: omniforum
    restart: unless-stopped
    environment:
      OMNIFORUM_HOST: 0.0.0.0
      OMNIFORUM_PORT: 8000
      OMNIFORUM_PUBLIC_URL: ${OMNIFORUM_PUBLIC_URL:-http://127.0.0.1:8000}
      OMNIFORUM_SECURE_COOKIES: ${OMNIFORUM_SECURE_COOKIES:-0}
      OMNIFORUM_MAX_REQUEST_BYTES: ${OMNIFORUM_MAX_REQUEST_BYTES:-50331648}
      OMNIFORUM_BACKUP_ROTATION: ${OMNIFORUM_BACKUP_ROTATION:-8}
      OMNIFORUM_BACKUP_STALE_HOURS: ${OMNIFORUM_BACKUP_STALE_HOURS:-168}
      OMNIFORUM_LIVE_INTERVAL_SECONDS: ${OMNIFORUM_LIVE_INTERVAL_SECONDS:-5}
      OMNIFORUM_USER_MEDIA_LIMIT_BYTES: ${OMNIFORUM_USER_MEDIA_LIMIT_BYTES:-67108864}
      OMNIFORUM_USER_MEDIA_LIMIT_FILES: ${OMNIFORUM_USER_MEDIA_LIMIT_FILES:-80}
      OMNIFORUM_MEDIA_SCAN_COMMAND: ${OMNIFORUM_MEDIA_SCAN_COMMAND:-}
      OMNIFORUM_MEDIA_SCAN_REQUIRED: ${OMNIFORUM_MEDIA_SCAN_REQUIRED:-0}
      OMNIFORUM_MEDIA_SCAN_TIMEOUT_SECONDS: ${OMNIFORUM_MEDIA_SCAN_TIMEOUT_SECONDS:-20}
      OMNIFORUM_EMAIL_AUTH_ENABLED: ${OMNIFORUM_EMAIL_AUTH_ENABLED:-0}
      OMNIFORUM_EMAIL_FROM: ${OMNIFORUM_EMAIL_FROM:-}
      OMNIFORUM_SMTP_HOST: ${OMNIFORUM_SMTP_HOST:-}
      OMNIFORUM_SMTP_PORT: ${OMNIFORUM_SMTP_PORT:-587}
      OMNIFORUM_SMTP_USERNAME: ${OMNIFORUM_SMTP_USERNAME:-}
      OMNIFORUM_SMTP_PASSWORD: ${OMNIFORUM_SMTP_PASSWORD:-}
      OMNIFORUM_SMTP_STARTTLS: ${OMNIFORUM_SMTP_STARTTLS:-1}
      OMNIFORUM_DISCORD_WEBHOOK_URL: ${OMNIFORUM_DISCORD_WEBHOOK_URL:-}
    ports:
      - "${OMNIFORUM_DOCKER_PORT:-8000}:8000"
    volumes:
      - omniforum-data:/app/data
    healthcheck:
      test: ["CMD", "python", "scripts/container_healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  omniforum-data:
