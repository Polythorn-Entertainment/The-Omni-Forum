# Caddy example for OmniForum.
# Replace forum.example.com and the upstream port, then keep OmniForum bound to 127.0.0.1.

forum.example.com {
	encode zstd gzip

	handle_path /media/* {
		root * /var/www/omniforum/data/uploads
		file_server
		header {
			X-Content-Type-Options nosniff
			Referrer-Policy same-origin
		}
	}

	handle_path /exports/* {
		root * /var/www/omniforum/data/exports
		file_server
		header {
			X-Content-Type-Options nosniff
			Referrer-Policy same-origin
		}
	}

	reverse_proxy 127.0.0.1:8000 {
		header_up X-Request-ID {http.request.header.X-Request-ID}
	}
}
