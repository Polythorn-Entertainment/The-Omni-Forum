/var/www/omniforum/data/logs/server.log {
    weekly
    rotate 8
    compress
    missingok
    notifempty
    copytruncate
    create 0640 www-data www-data
}

/var/www/omniforum/data/logs/access.log
/var/www/omniforum/data/logs/app.jsonl {
    weekly
    rotate 8
    compress
    missingok
    notifempty
    copytruncate
    create 0640 www-data www-data
}
