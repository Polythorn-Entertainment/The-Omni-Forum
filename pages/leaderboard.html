<body>
<div id="app">
<nav class="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">OmniForum</span></a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">Forum</a>

    </div>

  </div>
</nav>

<div class="breadcrumb">
  <a href="../index.html">Forum</a>
  <span class="breadcrumb-sep">›</span>
  <span class="breadcrumb-current">Leaderboard</span>
</div>

<main class="page-main">
  <div class="main-col">
    <div class="page-section">
      <div class="page-section-title">Leaderboard</div>

      <div class="sort-tabs mb-20">
        <button class="sort-tab active" data-metric="xp" onclick="setMetric('xp', this)">XP</button>
        <button class="sort-tab" data-metric="posts" onclick="setMetric('posts', this)">Posts</button>
        <button class="sort-tab" data-metric="role" onclick="setMetric('role', this)">Role Level</button>
      </div>

      <!-- Top 3 podium -->
      <div id="podium" class="leaderboard-podium"></div>

      <div class="leaderboard-list" id="leaderboardList"></div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-section">
      <h3 class="sidebar-title">Your Account</h3>
      <div id="sidebarUser" class="sidebar-user-panel"></div>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-title">Your Rank</h3>
      <div id="yourRank" class="center-pad-y"></div>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-title">How XP Works</h3>
      <ul class="sidebar-stats">
        <li><span>Post a thread</span><strong>+50 XP</strong></li>
        <li><span>Reply to thread</span><strong>+25 XP</strong></li>
        <li><span>Receive a like</span><strong>+10 XP</strong></li>
        <li><span>Reach member role</span><strong>100 XP</strong></li>
      </ul>
    </div>
  </aside>
</main>

<footer class="footer">
  <div class="footer-inner">
    <span class="logo-text footer-logo">◈ OmniForum</span>
    <span class="footer-copy">Community Forum · Built with passion · <span id="footerYear"></span></span>
    <div class="footer-links"><a href="rules.html">Rules</a><a href="privacy.html">Privacy</a><a href="contact.html">Contact</a></div>
  </div>
</footer>
</div>

<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>
