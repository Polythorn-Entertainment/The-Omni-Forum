<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniForum — Leaderboard</title>
<link rel="stylesheet" href="../css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
<nav class="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">OmniForum</span></a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">Forum</a>
      <a href="members.html" class="nav-link">Members</a>
      <a href="leaderboard.html" class="nav-link active">Leaderboard</a>
    </div>
    <div class="nav-actions" id="navActions"></div>
  </div>
</nav>

<div class="breadcrumb">
  <a href="../index.html">Forum</a>
  <span class="breadcrumb-sep">›</span>
  <span class="breadcrumb-current">Leaderboard</span>
</div>

<main class="page-main">
  <div class="main-col">
    <div class="page-section">
      <div class="page-section-title">Leaderboard</div>

      <div class="sort-tabs" style="margin-bottom:20px">
        <button class="sort-tab active" data-metric="xp" onclick="setMetric('xp', this)">XP</button>
        <button class="sort-tab" data-metric="posts" onclick="setMetric('posts', this)">Posts</button>
        <button class="sort-tab" data-metric="role" onclick="setMetric('role', this)">Role Level</button>
      </div>

      <!-- Top 3 podium -->
      <div id="podium" style="display:flex;gap:12px;justify-content:center;margin-bottom:28px;align-items:flex-end;"></div>

      <div class="leaderboard-list" id="leaderboardList"></div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-section">
      <h3 class="sidebar-title">Your Account</h3>
      <div id="sidebarUser" class="sidebar-user-panel"></div>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-title">Your Rank</h3>
      <div id="yourRank" style="text-align:center;padding:12px 0;"></div>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-title">How XP Works</h3>
      <ul class="sidebar-stats">
        <li><span>Post a thread</span><strong>+50 XP</strong></li>
        <li><span>Reply to thread</span><strong>+25 XP</strong></li>
        <li><span>Receive a like</span><strong>+10 XP</strong></li>
        <li><span>Reach member role</span><strong>100 XP</strong></li>
      </ul>
    </div>
  </aside>
</main>

<footer class="footer">
  <div class="footer-inner">
    <span class="logo-text footer-logo">◈ OmniForum</span>
    <span class="footer-copy">Community Forum · Built with passion · <span id="footerYear"></span></span>
    <div class="footer-links"><a href="rules.html">Rules</a><a href="privacy.html">Privacy</a><a href="contact.html">Contact</a></div>
  </div>
</footer>
</div>

<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>
<div id="toastContainer" class="toast-container"></div>

<script src="../js/api.js"></script>
<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/forum.js"></script>
<script src="../js/page-leaderboard.js"></script>
</body>
</html>
